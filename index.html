<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bookshelf – Search, discover and save books from the Open Library." />
  <title>Bookshelf</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  
  <a href="#main-content" class="skip-link">Skip to main content</a>

 
  <div id="cookie-banner" role="dialog" aria-label="Cookie consent" aria-live="polite">
    <p>We use local storage to save your reading list. <a href="#/privacy">Learn more</a></p>
    <div class="cookie-actions">
      <button id="cookie-accept" class="btn btn--accent btn--sm">Accept</button>
      <button id="cookie-decline" class="btn btn--outline btn--sm">Decline</button>
    </div>
  </div>

  
  <header id="site-header" role="banner">
    <nav class="nav" aria-label="Main navigation">
      <a href="#/" class="nav__logo" aria-label="Bookshelf home">
        <span class="nav__logo-mark">■</span> Bookshelf
      </a>
      <button
        class="nav__hamburger"
        id="nav-toggle"
        aria-controls="nav-menu"
        aria-expanded="false"
        aria-label="Toggle navigation menu"
      >
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__menu" id="nav-menu" role="list">
        <li><a href="#/"         class="nav__link" data-route="/">Home</a></li>
        <li><a href="#/search"   class="nav__link" data-route="/search">Search</a></li>
        <li><a href="#/reading"  class="nav__link" data-route="/reading">Reading List</a></li>
        <li><a href="#/contact"  class="nav__link" data-route="/contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  
  <main id="main-content" tabindex="-1" role="main"></main>


  <footer class="footer" role="contentinfo">
    <div class="footer__inner container">
      <p class="footer__brand"><span>■</span> Bookshelf</p>
      <nav aria-label="Footer navigation">
        <ul class="footer__links" role="list">
          <li><a href="#/">Home</a></li>
          <li><a href="#/search">Search</a></li>
          <li><a href="#/contact">Contact</a></li>
          <li><a href="#/privacy">Privacy Policy</a></li>
        </ul>
      </nav>
      <p class="footer__copy">
        Book data from <a href="https://openlibrary.org" target="_blank" rel="noopener noreferrer">Open Library</a> (free, no API key needed). &copy; 2025 Bookshelf.
      </p>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
